<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Output Test | Geopolitics Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --bg-card: #1a1f2e;
            --border-color: #2d3748;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .status-badge {
            background: var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
        }

        .card-source {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .card-snippet {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .refresh-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.9;
        }

        #news-count {
            font-weight: 700;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 2px dashed var(--border-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">W</div>
                <div>
                    <h1 style="font-size: 1.25rem;">Worker Testing Dashboard</h1>
                    <p style="font-size: 0.875rem; color: var(--text-muted);">Previewing <code>news.json</code> output</p>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Items: <span id="news-count">0</span></span>
            </div>
            <button class="refresh-btn" onclick="loadNews()">Refresh UI</button>
        </header>

        <div id="news-grid" class="grid">
            <!-- News items will be injected here -->
            <div class="empty-state">
                <p>Loading news from <code>news.json</code>...</p>
                <p style="font-size: 0.875rem; margin-top: 1rem;">Make sure you run <code>node test-rss.js</code> first!</p>
            </div>
        </div>
    </div>

    <script>
        async function loadNews() {
            const grid = document.getElementById('news-grid');
            const countEl = document.getElementById('news-count');
            
            try {
                const response = await fetch('news.json');
                if (!response.ok) throw new Error('Could not load news.json');
                
                const news = await response.json();
                countEl.textContent = news.length;
                
                if (news.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>No news found in news.json</p></div>';
                    return;
                }

                grid.innerHTML = news.map(item => `
                    <div class="card" onclick="window.open('${item.link}', '_blank')">
                        <div class="card-source">${item.sourceTitle || 'Unknown Source'}</div>
                        <h2 class="card-title">${item.title}</h2>
                        <p class="card-snippet">${item.contentSnippet || item.content || 'No description available.'}</p>
                        <div class="card-footer">
                            <span>${new Date(item.pubDate).toLocaleDateString()}</span>
                            <span>${new Date(item.fetchedAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state" style="border-color: #ef4444;">
                        <p style="color: #ef4444;">Error: ${err.message}</p>
                        <p style="font-size: 0.875rem; margin-top: 1rem;">
                            Note: Browsers usually block <code>fetch()</code> for local <code>file://</code> files due to CORS.<br>
                            Please serve this folder using a local server (e.g., <code>npx serve .</code>).
                        </p>
                    </div>
                `;
            }
        }

        // Initial load
        loadNews();
    </script>
</body>
</html>
